<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Up - Wemoo</title>
    <link rel="stylesheet" href="style.css">
</head>
<body style="display: flex; justify-content: center; align-items: center; min-height: 100vh; padding: 2rem;">
    <div id="loader" class="loader-container"><span class="loader"></span></div>
    <div id="notification" class="notification"></div>

    <div class="form-card" style="width: 100%; max-width: 400px;">
        <div style="text-align: center; margin-bottom: 2rem;">
            <h1 style="color: var(--accent-color); font-size: 2.5rem; font-weight: 800; letter-spacing: -1px;">Wemoo</h1>
            <p style="color: var(--text-secondary); margin-top: 0.5rem;">Create your account</p>
        </div>

        <form id="signup-form">
            <div class="form-group">
                <label for="reg-username">Username</label>
                <input type="text" id="reg-username" class="form-control" placeholder="Choose a username" required>
            </div>
            <div class="form-group">
                <label for="reg-email">Email Address</label>
                <input type="email" id="reg-email" class="form-control" placeholder="Enter your email" required>
            </div>
            <div class="form-group">
                <label for="reg-password">Password</label>
                <input type="password" id="reg-password" class="form-control" placeholder="Create a password" required>
            </div>
            <button type="submit" class="btn btn-primary" style="width: 100%; margin-top: 1rem;">Sign Up</button>
        </form>

        <div style="text-align: center; margin-top: 1.5rem;">
            <p style="color: var(--text-secondary); font-size: 0.9rem;">Already have an account? <a href="login.html" style="color: var(--accent-color); text-decoration: none;">Login</a></p>
            <a href="index.html" style="color: var(--text-secondary); text-decoration: none; font-size: 0.9rem; display: block; margin-top: 1rem;">&larr; Back to Home</a>
        </div>
    </div>

    <script type="module" src="script.js"></script>
</body>
</html>
