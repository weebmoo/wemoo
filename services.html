<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Services - Wemoo</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <div id="loader" class="loader-container"><span class="loader"></span></div>
    <div id="notification" class="notification"></div>

    <div class="app-container">
        <aside class="sidebar" id="sidebar">
            <div class="sidebar-header">Wemoo</div>
            <ul class="nav-links">
                <li><a href="dashboard.html"><i class="fas fa-home"></i> Dashboard</a></li>
                <li><a href="order.html"><i class="fas fa-plus-circle"></i> New Order</a></li>
                <li><a href="services.html" class="active"><i class="fas fa-list"></i> Services</a></li>
                <li><a href="orders.html"><i class="fas fa-history"></i> Orders History</a></li>
                <li><a href="balance.html"><i class="fas fa-wallet"></i> Add Funds</a></li>
            </ul>
            <div class="sidebar-footer">
                <a href="#" id="logout-btn" class="btn btn-outline" style="width: 100%;"><i class="fas fa-sign-out-alt"></i> Logout</a>
            </div>
        </aside>

        <main class="main-content">
            <header class="top-header">
                <div style="display: flex; align-items: center; gap: 1rem;">
                    <button id="mobile-toggle" class="mobile-toggle"><i class="fas fa-bars"></i></button>
                    <h1 style="font-size: 1.5rem;">Services List</h1>
                </div>
                <div class="user-info">
                    <div class="balance-badge">Balance: <span class="balance-value">$0.00</span></div>
                </div>
            </header>

            <div class="table-container">
                <table>
                    <thead>
                        <tr>
                            <th>ID</th>
                            <th>Service Name</th>
                            <th>Category</th>
                            <th>Rate / 1k</th>
                            <th>Min</th>
                            <th>Max</th>
                            <th>Action</th>
                        </tr>
                    </thead>
                    <tbody id="services-table-body">
                        <!-- Services will be loaded here -->
                    </tbody>
                </table>
            </div>
        </main>
    </div>

    <script type="module" src="script.js"></script>
</body>
</html>
