<!DOCTYPE html>
<html lang="en" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Order History | Wemoo Premium SMM</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Space+Grotesk:wght@500;700&display=swap" rel="stylesheet">
</head>
<body class="bg-white dark:bg-bg-dark text-slate-900 dark:text-white transition-colors duration-300">
    <!-- Loader -->
    <div id="loader" class="loader-container">
        <div class="flex flex-col items-center gap-4">
            <span class="loader"></span>
            <span class="text-sm font-medium animate-pulse">Wemoo Premium</span>
        </div>
    </div>

    <!-- Notification -->
    <div id="notification" class="notification"></div>

    <div class="flex min-h-screen">
        <!-- Sidebar -->
        <aside id="sidebar" class="fixed inset-y-0 left-0 z-50 w-72 bg-white dark:bg-card-dark border-r border-slate-100 dark:border-border-dark translate-x-full lg:translate-x-0 transition-transform duration-300">
            <div class="flex flex-col h-full p-6">
                <div class="flex items-center justify-between mb-12">
                    <a href="index.html" class="flex items-center gap-3">
                        <div class="w-8 h-8 bg-primary rounded-lg flex items-center justify-center text-black font-bold text-lg">W</div>
                        <span class="text-xl font-display font-bold tracking-tighter">Wemoo<span class="text-primary">.</span></span>
                    </a>
                    <button id="sidebar-close" class="lg:hidden text-xl p-2"><i class="fas fa-times"></i></button>
                </div>

                <nav class="flex-grow space-y-2">
                    <a href="dashboard.html" class="flex items-center gap-4 px-4 py-3 rounded-xl text-slate-500 hover:bg-slate-50 dark:hover:bg-white/5 transition-all">
                        <i class="fas fa-chart-pie w-6"></i>
                        <span>Dashboard</span>
                    </a>
                    <a href="order.html" class="flex items-center gap-4 px-4 py-3 rounded-xl text-slate-500 hover:bg-slate-50 dark:hover:bg-white/5 transition-all">
                        <i class="fas fa-plus-circle w-6"></i>
                        <span>New Order</span>
                    </a>
                    <a href="orders.html" class="flex items-center gap-4 px-4 py-3 rounded-xl bg-primary/10 text-primary font-bold transition-all">
                        <i class="fas fa-list-ul w-6"></i>
                        <span>Orders History</span>
                    </a>
                    <a href="services.html" class="flex items-center gap-4 px-4 py-3 rounded-xl text-slate-500 hover:bg-slate-50 dark:hover:bg-white/5 transition-all">
                        <i class="fas fa-tags w-6"></i>
                        <span>Services</span>
                    </a>
                    <a href="balance.html" class="flex items-center gap-4 px-4 py-3 rounded-xl text-slate-500 hover:bg-slate-50 dark:hover:bg-white/5 transition-all">
                        <i class="fas fa-wallet w-6"></i>
                        <span>Add Funds</span>
                    </a>
                </nav>

                <div class="mt-auto pt-6 border-t border-slate-100 dark:border-border-dark">
                    <a href="#" id="logout-btn" class="flex items-center gap-4 px-4 py-3 rounded-xl text-rose-500 hover:bg-rose-50 dark:hover:bg-rose-500/10 transition-all">
                        <i class="fas fa-sign-out-alt w-6"></i>
                        <span>Logout</span>
                    </a>
                </div>
            </div>
        </aside>

        <!-- Main Content -->
        <main class="flex-grow lg:ml-72 p-6 md:p-10">
            <!-- Top Header -->
            <header class="flex flex-col md:flex-row justify-between items-start md:items-center gap-6 mb-12">
                <div>
                    <h1 class="text-3xl font-display font-bold tracking-tight mb-2">Order History</h1>
                    <p class="text-slate-500 dark:text-slate-400">Track and manage all your social media growth orders.</p>
                </div>
                
                <div class="flex items-center gap-4 w-full md:w-auto">
                    <button id="theme-toggle" class="p-3 rounded-xl bg-slate-100 dark:bg-white/5 hover:bg-slate-200 dark:hover:bg-white/10 transition-colors">
                        <i class="fas fa-moon dark:hidden"></i>
                        <i class="fas fa-sun hidden dark:block"></i>
                    </button>
                    <div class="flex items-center gap-4 px-6 py-3 bg-primary/10 border border-primary/20 rounded-2xl flex-grow md:flex-grow-0">
                        <div class="w-10 h-10 bg-primary rounded-xl flex items-center justify-center text-black">
                            <i class="fas fa-wallet"></i>
                        </div>
                        <div>
                            <div class="text-[10px] uppercase tracking-widest font-bold text-primary/60">Balance</div>
                            <div class="text-xl font-display font-bold balance-value">$0.00</div>
                        </div>
                    </div>
                    <button id="mobile-toggle" class="lg:hidden p-3 rounded-xl bg-slate-100 dark:bg-white/5 text-xl">
                        <i class="fas fa-bars"></i>
                    </button>
                </div>
            </header>

            <div class="card p-0 overflow-hidden">
                <div class="p-6 border-b border-slate-100 dark:border-border-dark flex flex-col md:flex-row justify-between items-center gap-4">
                    <div class="relative w-full md:w-96">
                        <i class="fas fa-search absolute left-4 top-1/2 -translate-y-1/2 text-slate-400"></i>
                        <input type="text" placeholder="Search orders..." class="w-full pl-12 pr-4 py-3 bg-slate-50 dark:bg-white/5 border border-slate-100 dark:border-border-dark rounded-xl focus:ring-2 focus:ring-primary outline-none transition-all">
                    </div>
                    <div class="flex gap-2 w-full md:w-auto overflow-x-auto pb-2 md:pb-0">
                        <button class="px-4 py-2 rounded-lg bg-primary text-black text-xs font-bold">All</button>
                        <button class="px-4 py-2 rounded-lg bg-slate-100 dark:bg-white/5 text-slate-500 text-xs font-bold hover:bg-slate-200 dark:hover:bg-white/10 transition-all">Pending</button>
                        <button class="px-4 py-2 rounded-lg bg-slate-100 dark:bg-white/5 text-slate-500 text-xs font-bold hover:bg-slate-200 dark:hover:bg-white/10 transition-all">Processing</button>
                        <button class="px-4 py-2 rounded-lg bg-slate-100 dark:bg-white/5 text-slate-500 text-xs font-bold hover:bg-slate-200 dark:hover:bg-white/10 transition-all">Completed</button>
                    </div>
                </div>
                <div class="overflow-x-auto">
                    <table class="w-full text-left">
                        <thead class="bg-slate-50 dark:bg-white/2 border-b border-slate-100 dark:border-border-dark">
                            <tr>
                                <th class="py-4 px-6 text-[10px] font-bold text-slate-400 uppercase tracking-widest">Order ID</th>
                                <th class="py-4 px-6 text-[10px] font-bold text-slate-400 uppercase tracking-widest">Service</th>
                                <th class="py-4 px-6 text-[10px] font-bold text-slate-400 uppercase tracking-widest">Quantity</th>
                                <th class="py-4 px-6 text-[10px] font-bold text-slate-400 uppercase tracking-widest">Status</th>
                                <th class="py-4 px-6 text-[10px] font-bold text-slate-400 uppercase tracking-widest text-right">Price</th>
                            </tr>
                        </thead>
                        <tbody id="orders-table-body" class="divide-y divide-slate-100 dark:divide-border-dark">
                            <tr>
                                <td colspan="5" class="py-20 text-center text-slate-400">No orders found.</td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </main>
    </div>

    <script type="module" src="script.js"></script>
</body>
</html>
