<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Add Funds - Wemoo</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <div id="loader" class="loader-container"><span class="loader"></span></div>
    <div id="notification" class="notification"></div>

    <div class="app-container">
        <aside class="sidebar" id="sidebar">
            <div class="sidebar-header">Wemoo</div>
            <ul class="nav-links">
                <li><a href="dashboard.html"><i class="fas fa-home"></i> Dashboard</a></li>
                <li><a href="order.html"><i class="fas fa-plus-circle"></i> New Order</a></li>
                <li><a href="services.html"><i class="fas fa-list"></i> Services</a></li>
                <li><a href="orders.html"><i class="fas fa-history"></i> Orders History</a></li>
                <li><a href="balance.html" class="active"><i class="fas fa-wallet"></i> Add Funds</a></li>
            </ul>
            <div class="sidebar-footer">
                <a href="#" id="logout-btn" class="btn btn-outline" style="width: 100%;"><i class="fas fa-sign-out-alt"></i> Logout</a>
            </div>
        </aside>

        <main class="main-content">
            <header class="top-header">
                <div style="display: flex; align-items: center; gap: 1rem;">
                    <button id="mobile-toggle" class="mobile-toggle"><i class="fas fa-bars"></i></button>
                    <h1 style="font-size: 1.5rem;">Add Funds</h1>
                </div>
                <div class="user-info">
                    <div class="balance-badge">Balance: <span class="balance-value">$0.00</span></div>
                </div>
            </header>

            <div class="form-card">
                <div style="text-align: center; margin-bottom: 2rem;">
                    <i class="fas fa-wallet" style="font-size: 3rem; color: var(--accent-color); margin-bottom: 1rem;"></i>
                    <h2>Current Balance: <span class="balance-value">$0.00</span></h2>
                </div>

                <div class="form-group">
                    <label>Payment Method</label>
                    <select class="form-control">
                        <option>PayPal (Automatic)</option>
                        <option>Crypto (BTC, ETH, USDT)</option>
                        <option>Credit/Debit Card</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>Amount (USD)</label>
                    <input type="number" class="form-control" placeholder="Min: $5.00" value="10">
                </div>
                <button class="btn btn-primary" style="width: 100%; margin-top: 1rem;" onclick="alert('Payment gateway integration required for real transactions.')">Pay Now</button>
                
                <div style="margin-top: 2rem; padding: 1rem; background: rgba(255,255,255,0.03); border-radius: 8px; font-size: 0.85rem; color: var(--text-secondary);">
                    <p><strong>Note:</strong> Funds are added instantly after successful payment. If you encounter any issues, please contact our support team.</p>
                </div>
            </div>
        </main>
    </div>

    <script type="module" src="script.js"></script>
</body>
</html>
