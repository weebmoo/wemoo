<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard - Wemoo</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <div id="loader" class="loader-container"><span class="loader"></span></div>
    <div id="notification" class="notification"></div>

    <div class="app-container">
        <!-- Sidebar -->
        <aside class="sidebar" id="sidebar">
            <div class="sidebar-header">Wemoo</div>
            <ul class="nav-links">
                <li><a href="dashboard.html" class="active"><i class="fas fa-home"></i> Dashboard</a></li>
                <li><a href="order.html"><i class="fas fa-plus-circle"></i> New Order</a></li>
                <li><a href="services.html"><i class="fas fa-list"></i> Services</a></li>
                <li><a href="orders.html"><i class="fas fa-history"></i> Orders History</a></li>
                <li><a href="balance.html"><i class="fas fa-wallet"></i> Add Funds</a></li>
            </ul>
            <div class="sidebar-footer">
                <a href="#" id="logout-btn" class="btn btn-outline" style="width: 100%;"><i class="fas fa-sign-out-alt"></i> Logout</a>
            </div>
        </aside>

        <!-- Main Content -->
        <main class="main-content">
            <header class="top-header">
                <div style="display: flex; align-items: center; gap: 1rem;">
                    <button id="mobile-toggle" class="mobile-toggle"><i class="fas fa-bars"></i></button>
                    <h1 style="font-size: 1.5rem;">Dashboard</h1>
                </div>
                <div class="user-info">
                    <div class="balance-badge">Balance: <span class="balance-value">$0.00</span></div>
                    <span id="display-username" style="font-weight: 600;">User</span>
                </div>
            </header>

            <div class="stats-grid">
                <div class="stat-card">
                    <div class="stat-label">Total Balance</div>
                    <div class="stat-value balance-value">$0.00</div>
                </div>
                <div class="stat-card">
                    <div class="stat-label">Active Orders</div>
                    <div class="stat-value">0</div>
                </div>
                <div class="stat-card">
                    <div class="stat-label">Total Spent</div>
                    <div class="stat-value">$0.00</div>
                </div>
            </div>

            <h2 style="margin-bottom: 1.5rem;">Quick Actions</h2>
            <div class="stats-grid">
                <a href="order.html" class="stat-card" style="text-decoration: none; color: inherit; text-align: center; transition: transform 0.2s;">
                    <i class="fas fa-plus-circle" style="font-size: 2.5rem; color: var(--accent-color); margin-bottom: 1rem;"></i>
                    <div style="font-weight: 700;">New Order</div>
                </a>
                <a href="services.html" class="stat-card" style="text-decoration: none; color: inherit; text-align: center; transition: transform 0.2s;">
                    <i class="fas fa-search" style="font-size: 2.5rem; color: #3498db; margin-bottom: 1rem;"></i>
                    <div style="font-weight: 700;">Browse Services</div>
                </a>
                <a href="orders.html" class="stat-card" style="text-decoration: none; color: inherit; text-align: center; transition: transform 0.2s;">
                    <i class="fas fa-clipboard-list" style="font-size: 2.5rem; color: #f1c40f; margin-bottom: 1rem;"></i>
                    <div style="font-weight: 700;">Order Status</div>
                </a>
                <a href="balance.html" class="stat-card" style="text-decoration: none; color: inherit; text-align: center; transition: transform 0.2s;">
                    <i class="fas fa-dollar-sign" style="font-size: 2.5rem; color: #2ecc71; margin-bottom: 1rem;"></i>
                    <div style="font-weight: 700;">Add Funds</div>
                </a>
            </div>
        </main>
    </div>

    <script type="module" src="script.js"></script>
</body>
</html>
