<!DOCTYPE html>
<html lang="en" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | Wemoo Premium SMM</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Space+Grotesk:wght@500;700&display=swap" rel="stylesheet">
</head>
<body class="bg-white dark:bg-bg-dark text-slate-900 dark:text-white transition-colors duration-300">
    <!-- Loader -->
    <div id="loader" class="loader-container">
        <div class="flex flex-col items-center gap-4">
            <span class="loader"></span>
            <span class="text-sm font-medium animate-pulse">Wemoo Premium</span>
        </div>
    </div>

    <!-- Notification -->
    <div id="notification" class="notification"></div>

    <div class="min-h-screen flex flex-col justify-center items-center p-6 relative overflow-hidden">
        <!-- Background Elements -->
        <div class="absolute top-0 left-1/2 -translate-x-1/2 w-[1000px] h-[600px] bg-primary/10 blur-[120px] rounded-full -z-10"></div>
        <div class="absolute bottom-0 right-0 w-64 h-64 bg-primary/5 blur-3xl rounded-full translate-y-1/2 translate-x-1/2 -z-10"></div>
        
        <div class="w-full max-w-md">
            <div class="text-center mb-12">
                <a href="index.html" class="inline-flex items-center gap-3 mb-8">
                    <div class="w-12 h-12 bg-primary rounded-xl flex items-center justify-center text-black font-bold text-2xl shadow-lg shadow-primary/20">W</div>
                    <span class="text-3xl font-display font-bold tracking-tighter">Wemoo<span class="text-primary">.</span></span>
                </a>
                <h1 class="text-4xl font-display font-bold tracking-tight mb-4">Welcome Back</h1>
                <p class="text-slate-500 dark:text-slate-400">Log in to your premium SMM account.</p>
            </div>

            <div class="card p-8 md:p-10">
                <form id="login-form" class="space-y-6">
                    <div>
                        <label for="username" class="block text-sm font-bold text-slate-400 uppercase tracking-widest mb-3">Username</label>
                        <div class="relative">
                            <i class="fas fa-user absolute left-4 top-1/2 -translate-y-1/2 text-slate-400"></i>
                            <input type="text" id="username" placeholder="Enter your username" class="w-full pl-12 pr-4 py-4 bg-slate-50 dark:bg-white/5 border border-slate-100 dark:border-border-dark rounded-2xl focus:ring-2 focus:ring-primary outline-none transition-all">
                        </div>
                    </div>

                    <div>
                        <label for="password" class="block text-sm font-bold text-slate-400 uppercase tracking-widest mb-3">Password</label>
                        <div class="relative">
                            <i class="fas fa-lock absolute left-4 top-1/2 -translate-y-1/2 text-slate-400"></i>
                            <input type="password" id="password" placeholder="Enter your password" class="w-full pl-12 pr-4 py-4 bg-slate-50 dark:bg-white/5 border border-slate-100 dark:border-border-dark rounded-2xl focus:ring-2 focus:ring-primary outline-none transition-all">
                        </div>
                    </div>

                    <div class="flex justify-between items-center text-sm">
                        <label class="flex items-center gap-2 cursor-pointer">
                            <input type="checkbox" class="w-4 h-4 rounded border-slate-300 text-primary focus:ring-primary">
                            <span class="text-slate-500 dark:text-slate-400">Remember me</span>
                        </label>
                        <a href="#" class="text-primary font-bold hover:underline">Forgot password?</a>
                    </div>

                    <button type="submit" class="btn btn-primary w-full py-4 text-lg">Log In <i class="fas fa-sign-in-alt ml-2"></i></button>
                </form>

                <div class="mt-10 pt-8 border-t border-slate-100 dark:border-border-dark text-center">
                    <p class="text-slate-500 dark:text-slate-400">Don't have an account? <a href="signup.html" class="text-primary font-bold hover:underline">Sign up for free</a></p>
                </div>
            </div>

            <div class="mt-12 flex justify-center gap-6 text-slate-400 text-sm font-medium">
                <a href="index.html" class="hover:text-primary transition-colors">Home</a>
                <a href="terms.html" class="hover:text-primary transition-colors">Terms</a>
                <a href="privacy.html" class="hover:text-primary transition-colors">Privacy</a>
                <button id="theme-toggle" class="hover:text-primary transition-colors">
                    <i class="fas fa-moon dark:hidden"></i>
                    <i class="fas fa-sun hidden dark:block"></i>
                </button>
            </div>
        </div>
    </div>

    <script type="module" src="script.js"></script>
</body>
</html>
